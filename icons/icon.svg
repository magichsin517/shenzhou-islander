<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="神州上的島民">
  <title>神州上的島民</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5BA0D8"/>
      <stop offset="1" stop-color="#2A5F8C"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8C295"/>
      <stop offset="1" stop-color="#B08754"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFE8A8"/>
      <stop offset="1" stop-color="#F2B95A"/>
    </radialGradient>
  </defs>

  <!-- 圓角背景（海水） -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- 太陽 -->
  <circle cx="380" cy="150" r="44" fill="url(#sun)"/>

  <!-- 海浪線 -->
  <path d="M 0 360 Q 64 348, 128 360 T 256 360 T 384 360 T 512 360 V 380 H 0 Z"
        fill="#3A7FB8" opacity="0.55"/>
  <path d="M 0 390 Q 64 378, 128 390 T 256 390 T 384 390 T 512 390 V 410 H 0 Z"
        fill="#3A7FB8" opacity="0.4"/>

  <!-- 沙土島 -->
  <ellipse cx="256" cy="380" rx="180" ry="58" fill="url(#sand)"/>
  <ellipse cx="256" cy="378" rx="160" ry="46" fill="#E0B886" opacity="0.65"/>

  <!-- 椰子樹 -->
  <g transform="translate(180, 200)">
    <!-- 樹幹 -->
    <path d="M 32 0 Q 28 60, 36 130 Q 38 160, 30 180 L 42 180 Q 50 160, 48 130 Q 50 60, 44 0 Z"
          fill="#7A4A2A"/>
    <!-- 葉子 -->
    <g fill="#3FA76A">
      <path d="M 38 0 Q 100 -10, 130 -50 Q 70 -30, 38 -8 Z"/>
      <path d="M 38 0 Q 100 20, 140 0 Q 80 8, 38 8 Z" opacity="0.85"/>
      <path d="M 38 0 Q -30 -10, -60 -50 Q 0 -30, 38 -8 Z"/>
      <path d="M 38 0 Q -20 20, -60 0 Q 0 8, 38 8 Z" opacity="0.85"/>
      <path d="M 38 0 Q 50 -50, 30 -110 Q 18 -55, 32 0 Z"/>
    </g>
    <!-- 椰子 -->
    <circle cx="48" cy="6" r="6" fill="#5A3A24"/>
    <circle cx="30" cy="10" r="5" fill="#5A3A24"/>
  </g>

  <!-- 主標：島 -->
  <g transform="translate(256, 320)">
    <text text-anchor="middle" font-family="-apple-system, 'PingFang TC', 'Microsoft JhengHei', sans-serif"
          font-weight="900" font-size="84" fill="#FFFFFF" stroke="#2A5F8C" stroke-width="3" paint-order="stroke">島</text>
  </g>

  <!-- 角標亮點（小白圓代表「光」） -->
  <circle cx="120" cy="120" r="8" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="92" cy="170" r="5" fill="#FFFFFF" opacity="0.5"/>
</svg>
